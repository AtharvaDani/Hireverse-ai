# =========================================================
# Application
# =========================================================
spring.application.name=resume-ai-backend
server.port=8080

# =========================================================
# Database
# =========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JPA
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =========================================================
# Google Gemini
# =========================================================
spring.ai.google.genai.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.chat.options.model=${GOOGLE_CHAT_MODEL}
spring.ai.google.genai.chat.options.temperature=0.4

spring.ai.google.genai.embedding.api-key=${GOOGLE_API_KEY}
spring.ai.google.genai.embedding.text.model=${GOOGLE_EMBEDDING_MODEL}
spring.ai.google.genai.embedding.text.options.dimensions=${GOOGLE_EMBEDDING_DIMENSIONS}

# =========================================================
# Groq
# =========================================================
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=${GROQ_BASE_URL}
spring.ai.openai.chat.options.model=${GROQ_MODEL}
spring.ai.openai.chat.options.temperature=0.4
spring.ai.openai.embedding.enabled=false

# =========================================================
# pgvector
# =========================================================
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.table-name=resume_vector_store

# =========================================================
# File Upload
# =========================================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# =========================================================
# CORS
# =========================================================
app.cors.allowed-origin=${FRONTEND_ORIGIN}

# =========================================================
# Logging
# =========================================================
logging.level.com.resumeai=DEBUG
logging.level.org.springframework.ai=INFO

# =========================================================
# Adzuna
# =========================================================
adzuna.app-id=${ADZUNA_APP_ID}
adzuna.app-key=${ADZUNA_APP_KEY}
adzuna.country=${ADZUNA_COUNTRY}

# =========================================================
# AssemblyAI
# =========================================================
assemblyai.api-key=${ASSEMBLYAI_API_KEY}